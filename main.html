<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Login 2</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 420px;
    }

    h2 {
      text-align: center;
      margin-bottom: 28px;
      color: #333;
      font-size: 24px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #555;
      font-size: 14px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
    }

    input:focus {
      border-color: #4f8ef7;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #4f8ef7;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    button:hover {
      background: #3a74d6;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Login Form</h2>

    <div class="form-group">
      <label>First Name</label>
      <input type="text" name="First Name" placeholder="Enter first name" />
    </div>

    <div class="form-group">
      <label>Last Name</label>
      <input type="text" name="Last Name" placeholder="Enter last name" />
    </div>

    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" name="Phone Number" placeholder="Enter phone number" />
    </div>

    <div class="form-group">
      <label>Email ID</label>
      <input type="email" name="Email ID" placeholder="Enter email address" />
    </div>

    <button onclick="handleSubmit()">Submit</button>
  </div>

  <script>
    function handleSubmit() {
      const firstName   = document.querySelector('input[name="First Name"]').value;
      const lastName    = document.querySelector('input[name="Last Name"]').value;
      const phoneNumber = document.querySelector('input[name="Phone Number"]').value;
      const emailID     = document.querySelector('input[name="Email ID"]').value;

      alert(
        "First Name: " + firstName + " " +
        "Last Name: " + lastName + " " +
        "Phone Number: " + phoneNumber + " " +
        "Email ID: " + emailID
      );
    }
  </script>

</body>
</html>
